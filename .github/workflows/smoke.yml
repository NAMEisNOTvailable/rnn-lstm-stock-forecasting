name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  notebook-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run notebook smoke checks
        run: |
          python - <<'PY'
          import importlib
          import json
          from pathlib import Path

          for module_name in ("tensorflow", "numpy", "pandas", "matplotlib", "sklearn", "openpyxl"):
              importlib.import_module(module_name)

          notebooks = sorted(Path("notebooks").glob("*.ipynb"))
          if not notebooks:
              raise SystemExit("No notebooks found under notebooks/")

          for notebook in notebooks:
              data = json.loads(notebook.read_text(encoding="utf-8"))
              if "cells" not in data or "nbformat" not in data:
                  raise SystemExit(f"{notebook} is not a valid notebook JSON document")

          print(f"Validated {len(notebooks)} notebook(s).")
          PY
