name: Smoke tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  project-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest

      - name: Run baseline metrics check
        run: python scripts/run_baseline.py --output results/ci_baseline_metrics.csv

      - name: Compile project files
        run: python -m compileall src scripts tests

      - name: Run notebook smoke checks
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          notebooks = sorted(Path("notebooks").glob("*.ipynb"))
          if not notebooks:
              raise SystemExit("No notebooks found under notebooks/")

          for notebook in notebooks:
              data = json.loads(notebook.read_text(encoding="utf-8"))
              if "cells" not in data or "nbformat" not in data:
                  raise SystemExit(f"{notebook} is not a valid notebook JSON document")

          print(f"Validated {len(notebooks)} notebook(s).")
          PY
